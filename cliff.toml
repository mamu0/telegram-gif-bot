# git-cliff configuration (https://git-cliff.org/)
#
# How it work:
#   New release:     git cliff --unreleased --tag v0.0.3 --prepend CHANGELOG.md
#   Regenrate all:   git cliff --output CHANGELOG.md
#
# commit conventions: <type>: <description>
#   feat:      new feature
#   fix:       bug fix
#   security:  security/dependences update
#   refactor:  refactoring without logic changes
#   docs:      only documentation
#   chore/ci:  ignored

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat",                 group = "Added"         },
    { message = "^fix",                  group = "Fixed"         },
    { message = "^security|^sec",        group = "Security"      },
    { message = "^refactor",             group = "Changed"       },
    { message = "^perf",                 group = "Performance"   },
    { message = "^docs",                 group = "Documentation" },
    { message = "^test|^chore|^ci|^style", skip = true          },
]
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
